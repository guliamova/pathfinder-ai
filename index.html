<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pathfinder AI</title>
</head>
<body>

<textarea id="cvText" placeholder="Paste CV..."></textarea>
<button id="analyzeBtn">Analyze</button>

<div id="result"></div>

<script>
let cvContent = '';

document.getElementById('cvText').addEventListener('input', checkAnalyzeReady);

function checkAnalyzeReady(){
  const hasContent =
    cvContent ||
    document.getElementById('cvText').value.trim();

  document.getElementById('analyzeBtn').disabled = !hasContent;
}

document.getElementById('analyzeBtn').addEventListener('click', runAnalysis);

async function callBackend(prompt, options = {}) {
  const res = await fetch('/api/analyze', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({
      mode: options.mode || 'profile-analysis',
      prompt,
      jsonMode: !!options.jsonMode,
      chatHistory: options.chatHistory || null,
      systemInstruction: options.systemInstruction || null
    })
  });

  if (!res.ok) {
    let msg = `API error ${res.status}`;
    try {
      const err = await res.json();
      msg = err.error || err.message || msg;
    } catch (_) {}
    throw new Error(msg);
  }

  return await res.json();
}

async function runAnalysis(){
  const cv = document.getElementById('cvText').value.trim();

  const prompt = `
Analyze this CV and return STRICT JSON:

{
  "summary": "...",
  "strengths": [],
  "gaps": [],
  "recommendations": []
}

CV:
${cv}
`;

  try {
    const data = await callBackend(prompt, {
      mode: 'profile-analysis',
      jsonMode: true
    });

    const result = data.result;

    document.getElementById('result').innerHTML = `
      <h3>Summary</h3>
      <p>${result.summary}</p>

      <h3>Strengths</h3>
      <ul>${result.strengths.map(s => `<li>${s}</li>`).join('')}</ul>

      <h3>Gaps</h3>
      <ul>${result.gaps.map(s => `<li>${s}</li>`).join('')}</ul>

      <h3>Recommendations</h3>
      <ul>${result.recommendations.map(s => `<li>${s}</li>`).join('')}</ul>
    `;

  } catch (e) {
    document.getElementById('result').innerHTML =
      `<p style="color:red">Error: ${e.message}</p>`;
  }
}
</script>

</body>
</html>
